name: Deploy to Prod

on:
  release:
    types: [published]

  # Allow manual trigger for emergency deployments
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

jobs:
  validate:
    name: Validate bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle (prod target)
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: databricks bundle validate --target prod

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production   # requires manual approval in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy to prod
        env:
          DATABRICKS_HOST:    ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN:   ${{ secrets.DATABRICKS_TOKEN_PROD }}
          DATABRICKS_SP_NAME: ${{ secrets.DATABRICKS_SP_NAME_PROD }}
        run: |
          databricks bundle deploy --target prod \
            --var="sp_name=${DATABRICKS_SP_NAME}"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Ride Analytics deployed to *production* successfully!\nRelease: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
