bundle:
  name: realtime-ride-analytics

variables:
  alert_email:
    description: "Email to notify on job failure"
    default: ""
  sp_name:
    description: "Service principal name for prod deployments"
    default: ""
  kafka_bootstrap_servers:
    description: "Confluent Kafka bootstrap servers (host:port)"
    default: "pkc-921jm.us-east-2.aws.confluent.cloud:9092"
  kafka_topic:
    description: "Kafka topic name for ride events"
    default: "ride-events"
  kafka_secret_scope:
    description: "Databricks secret scope holding Kafka API key/secret"
    default: "confluent-kafka"
  catalog:
    description: "Unity Catalog catalog name"
    default: "workspace"
  warehouse_id:
    description: "SQL warehouse ID for the dashboard"
    default: "6f9ea3149e2abcf0"

include:
  - resources/*.yml

targets:
  dev:
    mode: production
    default: true
    workspace:
      host: https://dbc-aef35066-afa2.cloud.databricks.com/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
